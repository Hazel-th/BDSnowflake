services:
  postgres:
    image: postgres:16
    container_name: bdlab1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bdlab1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./sql:/sql:ro
      - "./исходные данные:/data:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdlab1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
